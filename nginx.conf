server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Кодировка ──────────────────────────────────────────────
    charset utf-8;

    # ── Gzip-сжатие ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/rss+xml
        application/atom+xml image/svg+xml font/woff2;

    # ── Security-заголовки ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Кэширование статических ассетов ────────────────────────
    # Next.js хэшированные ассеты (_next/static/) — кешируем навсегда
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Изображения, шрифты, медиа
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # CSS и JS без хэша (robots.txt, sitemap.xml и пр.)
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # sitemap и robots — не кэшировать долго
    location ~* (sitemap\.xml|robots\.txt|llms\.txt)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Маршруты SPA / Next.js static export ───────────────────
    location / {
        try_files $uri $uri.html $uri/ /index.html =404;
    }

    # ── Кастомная 404 ───────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
