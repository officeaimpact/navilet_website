server {
    listen 80;
    server_name navilet.ru www.navilet.ru;

    # Редирект HTTP → HTTPS
    location / {
        return 301 https://navilet.ru$request_uri;
    }

    # certbot webroot для продления сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name navilet.ru www.navilet.ru;
    root /usr/share/nginx/html;
    index index.html;

    # SSL — сертификаты монтируются как volume
    ssl_certificate     /etc/letsencrypt/live/navilet.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/navilet.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Редирект www → без www
    if ($host = www.navilet.ru) {
        return 301 https://navilet.ru$request_uri;
    }

    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/rss+xml
        application/atom+xml image/svg+xml font/woff2;

    # Security-заголовки
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "upgrade-insecure-requests; block-all-mixed-content" always;

    # Кэш для _next/static
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Изображения, шрифты
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* (sitemap\.xml|robots\.txt|llms\.txt)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
